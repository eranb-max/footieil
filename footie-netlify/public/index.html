<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Footy — בוט עובדים | Foot Locker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #ffffff;
    --gray-100: #f5f5f5;
    --gray-200: #e8e8e8;
    --gray-400: #999;
    --gray-600: #555;
    --red: #e30613;
    --red-dark: #b8040f;
    --stripe: repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 18px,
      rgba(255,255,255,0.07) 18px, rgba(255,255,255,0.07) 20px
    );
  }

  html, body {
    height: 100%;
    font-family: 'Heebo', sans-serif;
    background: var(--black);
    color: var(--white);
    overflow: hidden;
  }

  /* ===== LAYOUT ===== */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    background: #111;
    box-shadow: 0 0 80px rgba(0,0,0,0.8);
  }

  /* ===== HEADER ===== */
  header {
    background: var(--black);
    padding: 0 16px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--red);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  header::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--stripe);
    pointer-events: none;
    opacity: 0.5;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .referee-icon {
    width: 36px;
    height: 36px;
    background: var(--white);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .referee-icon svg {
    width: 22px;
    height: 22px;
  }
  .header-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--white);
    line-height: 1;
  }
  .header-subtitle {
    font-size: 9px;
    color: var(--gray-400);
    letter-spacing: 0.3px;
    margin-top: 3px;
    max-width: 240px;
    line-height: 1.4;
    direction: rtl;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 8px #22c55e;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:0.4; }
  }

  /* ===== QUICK CHIPS ===== */
  .chips-bar {
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
    background: #0d0d0d;
    border-bottom: 1px solid #222;
    scrollbar-width: none;
  }
  .chips-bar::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    background: #1e1e1e;
    border: 1px solid #333;
    color: var(--gray-400);
    font-family: 'Heebo', sans-serif;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chip:hover {
    background: var(--red);
    border-color: var(--red);
    color: var(--white);
  }

  /* ===== MESSAGES ===== */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .msg {
    display: flex;
    gap: 10px;
    animation: msgIn 0.2s ease;
    max-width: 90%;
  }
  @keyframes msgIn {
    from { opacity:0; transform: translateY(8px); }
    to { opacity:1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; align-self: flex-start; }
  .msg.bot { align-self: flex-end; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    margin-top: 2px;
  }
  .msg.bot .msg-avatar {
    background: var(--red);
  }
  .msg.user .msg-avatar {
    background: #2a2a2a;
    font-size: 16px;
  }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    max-width: 100%;
  }
  .msg.bot .msg-bubble {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-bottom-right-radius: 4px;
    color: var(--white);
  }
  .msg.user .msg-bubble {
    background: var(--red);
    border-bottom-left-radius: 4px;
    color: var(--white);
  }

  /* Markdown-like styling in bot messages */
  .msg-bubble strong { color: #f5f5f5; font-weight: 700; }
  .msg-bubble ol, .msg-bubble ul {
    padding-right: 18px;
    margin: 6px 0;
  }
  .msg-bubble li { margin: 3px 0; }
  .msg-bubble code {
    background: #0a0a0a;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--red);
    font-family: monospace;
  }
  .msg-bubble hr {
    border: none;
    border-top: 1px solid #333;
    margin: 8px 0;
  }
  .msg-bubble .highlight {
    color: var(--red);
    font-weight: 700;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 12px 14px;
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    border-bottom-right-radius: 4px;
    width: fit-content;
  }
  .typing span {
    width: 7px; height: 7px;
    background: var(--red);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform:translateY(0); opacity:0.4; }
    30% { transform:translateY(-6px); opacity:1; }
  }

  /* ===== INPUT AREA ===== */
  #input-area {
    padding: 12px 16px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    background: #0d0d0d;
    border-top: 1px solid #222;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #user-input {
    flex: 1;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 24px;
    padding: 10px 18px;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    color: var(--white);
    outline: none;
    resize: none;
    max-height: 100px;
    min-height: 44px;
    line-height: 1.5;
    transition: border-color 0.15s;
    direction: rtl;
    scrollbar-width: none;
  }
  #user-input::-webkit-scrollbar { display: none; }
  #user-input:focus { border-color: var(--red); }
  #user-input::placeholder { color: #555; }

  #send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--red);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  #send-btn:hover { background: var(--red-dark); }
  #send-btn:active { transform: scale(0.93); }
  #send-btn:disabled { background: #333; cursor: not-allowed; }
  #send-btn svg { width: 18px; height: 18px; fill: white; }

  

  /* ===== WELCOME MSG ===== */
  .welcome-card {
    background: linear-gradient(135deg, #1a0a0a, #1e1e1e);
    border: 1px solid #2a2a2a;
    border-right: 3px solid var(--red);
    border-radius: 12px;
    padding: 16px;
    font-size: 13px;
    color: var(--gray-400);
    line-height: 1.8;
    align-self: flex-end;
    width: 100%;
  }
  .welcome-card .wc-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 22px;
    color: var(--white);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .welcome-card .wc-title span { color: var(--red); }
  .topic-pill {
    display: inline-block;
    background: #111;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--gray-400);
    margin: 2px 3px;
  }
</style>
</head>

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendChip(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'bot' ? '👟' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = formatText(text);

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^(\d+)\. /gm, '<br><strong>$1.</strong> ')
    .replace(/^- /gm, '• ')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>')
    .replace(/^<br>/, '');
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '👟';

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';

  wrap.appendChild(avatar);
  wrap.appendChild(typing);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  showTyping();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: SYSTEM_PROMPT, messages: conversationHistory })
    });

    const data = await response.json();

    if (data.error) {
      removeTyping();
      addMessage('bot', `❌ שגיאה: ${data.error.message}`);
      conversationHistory.pop();
    } else {
      const reply = data.content[0].text;
      removeTyping();
      addMessage('bot', reply);
      conversationHistory.push({ role: 'assistant', content: reply });
    }
  } catch (err) {
    removeTyping();
    addMessage('bot', '❌ בעיית חיבור. בדוק את החיבור לאינטרנט ונסה שוב.');
    conversationHistory.pop();
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

// Fix iOS keyboard
if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
  const inp = document.getElementById('user-input');
  inp.addEventListener('focus', () => {
    setTimeout(() => {
      document.getElementById('messages').scrollTop = 999999;
    }, 400);
  });
}
